    /* Compact Contact Form */

    /* Canvas space background */

  <script>
    // Peaceful space canvas logic
    const canvas = document.getElementById('space-canvas');
    const ctx = canvas.getContext('2d');

    let width, height;
    let stars = [];
    let meteors = [];

    function init() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;

      // Generate static stars
      stars = [];
      const numStars = Math.floor((width * height) / 4000);
      for (let i = 0; i < numStars; i++) {
        stars.push({
          x: Math.random() * width,
          y: Math.random() * height,
          radius: Math.random() * 1.5,
          alpha: Math.random(),
          speed: (Math.random() * 0.005) + 0.001
        });
      }
    }

    function draw() {
      ctx.clearRect(0, 0, width, height);

      // Draw faint twinkling stars
      stars.forEach(star => {
        star.alpha += star.speed;
        if (star.alpha > 1 || star.alpha < 0) {
          star.speed = -star.speed;
        }
        
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${Math.max(0, star.alpha * 0.5)})`;
        ctx.fill();
      });

      // Draw shooting stars / faint meteors
      meteors.forEach((meteor, index) => {
        ctx.beginPath();
        ctx.moveTo(meteor.x, meteor.y);
        ctx.lineTo(meteor.x - meteor.length, meteor.y - meteor.length); // Moving towards bottom-left
        
        let gradient = ctx.createLinearGradient(
          meteor.x, meteor.y, 
          meteor.x - meteor.length, meteor.y - meteor.length
        );
        gradient.addColorStop(0, `rgba(255, 255, 255, ${meteor.opacity})`);
        gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
        
        ctx.strokeStyle = gradient;
        ctx.lineWidth = 1;
        ctx.stroke();

        // Move meteor
        meteor.x -= meteor.speed;
        meteor.y += meteor.speed;
        meteor.opacity -= 0.01;

        if (meteor.opacity <= 0) {
          meteors.splice(index, 1);
        }
      });

      requestAnimationFrame(draw);
    }

    function createMeteor() {
      if (Math.random() < 0.3) {
        meteors.push({
          x: Math.random() * width * 1.5,
          y: Math.random() * height * 0.5 - height * 0.5,
          length: Math.random() * 50 + 20,
          speed: Math.random() * 2 + 1,
          opacity: 0.8
        });
      }
      // Faint gentle meteors every 2-6 seconds
      setTimeout(createMeteor, Math.random() * 4000 + 2000);
    }

    window.addEventListener('resize', init);
    init();
    draw();
    createMeteor();
  </script>
