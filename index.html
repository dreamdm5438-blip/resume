<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>หน้าแรก | ขจรศักดิ์ สิทธิวงศ์</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&family=Kanit:wght@400;600;700&display=swap"
    rel="stylesheet" />
  <style>
    /* ===== RESET & BASE ===== */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #03020a;
      color: white;
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== NAVBAR (แถบเมนูจักรวาล) ===== */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 15px 40px;
      background: rgba(0, 0, 0, 0.8);
      /* พื้นหลังดำโปร่งแสง */
      backdrop-filter: blur(10px);
      z-index: 1000;
      display: flex;
      justify-content: center;
      border-bottom: 1px solid rgba(255, 215, 0, 0.2);
    }

    .nav-brand {
      font-family: 'Kanit', sans-serif;
      font-size: 1.5rem;
      color: #ffd700;
      font-weight: 700;
      display: none;
      /* ซ่อนชื่อแบรนด์ถ้าหน้าจอเล็ก */
    }

    .nav-menu {
      list-style: none;
      display: flex;
      gap: 15px;
      margin: 0;
      padding: 0;
    }

    .nav-menu a {
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      font-family: 'Kanit', sans-serif;
      font-size: 0.95rem;
      padding: 8px 15px;
      border-radius: 5px;
      transition: 0.3s;
    }

    .nav-menu a:hover,
    .nav-menu a.active {
      color: #ffd700;
      /* สีทอง */
      background: rgba(255, 215, 0, 0.1);
    }

    /* ===== HERO SECTION (ส่วนหัวหน้าแรกใหม่) ===== */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: radial-gradient(circle at center, rgba(60, 20, 120, 0.6) 0%, #03020a 80%);
      padding: 0 20px;
      position: relative;
    }

    .glass-container {
      background: rgba(20, 10, 50, 0.4);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 215, 0, 0.2);
      border-radius: 20px;
      padding: 50px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 215, 0, 0.05);
      animation: floatContainer 6s ease-in-out infinite;
      z-index: 10;
      max-width: 800px;
    }

    @keyframes floatContainer {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    /* ใส่รูปพื้นหลังที่นี่ */
    .hero-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('bg-space-new.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 1;
      opacity: 0.4;
    }

    .hero h1 {
      font-family: 'Kanit', sans-serif;
      font-size: 3.5rem;
      color: #ffd700;
      text-shadow: 0 0 15px rgba(255, 215, 0, 0.8), 0 0 30px rgba(255, 215, 0, 0.4);
      margin-bottom: 10px;
    }

    .hero h2 {
      font-family: 'Sarabun', sans-serif;
      font-size: 1.3rem;
      color: #ffd700;
      font-weight: 400;
      max-width: 600px;
      line-height: 1.6;
      margin-bottom: 35px;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
    }

    .cta-btn {
      display: inline-block;
      padding: 15px 45px;
      background: linear-gradient(45deg, #ff8c00, #ffd700, #ff8c00);
      background-size: 200% 200%;
      color: #03020a;
      text-decoration: none;
      font-family: 'Kanit', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      border-radius: 50px;
      transition: 0.4s;
      box-shadow: 0 0 20px rgba(255, 140, 0, 0.6), 0 0 40px rgba(255, 215, 0, 0.4);
      animation: pulseBtn 2s infinite, gradientMove 3s ease infinite;
    }

    @keyframes gradientMove {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    @keyframes pulseBtn {

      0%,
      100% {
        transform: scale(1);
        box-shadow: 0 0 20px rgba(255, 140, 0, 0.6);
      }

      50% {
        transform: scale(1.05);
        box-shadow: 0 0 35px rgba(255, 215, 0, 0.8);
      }
    }

    .cta-btn:hover {
      transform: scale(1.1);
    }

    /* สไตล์สำหรับรูปภาพโปรไฟล์ */
    .profile-img {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: 4px solid #ffd700;
      object-fit: cover;
      margin-bottom: 25px;
      box-shadow: 0 0 25px rgba(255, 215, 0, 0.6), 0 0 50px rgba(255, 215, 0, 0.3);
      animation: floatImg 4s ease-in-out infinite;
      z-index: 20;
    }

    @keyframes floatImg {

      0%,
      100% {
        transform: translateY(0px) rotate(0deg);
      }

      50% {
        transform: translateY(-15px) rotate(2deg);
      }
    }

    /* ===== FOOTER ===== */
    footer {
      padding: 30px;
      text-align: center;
      color: rgba(255, 255, 255, 0.3);
      font-size: 0.8rem;
      border-top: 1px solid rgba(255, 215, 0, 0.1);
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <div class="nav-brand">✦ KS</div>
    <ul class="nav-menu">
      <li><a href="index.html" class="active">หน้าแรก</a></li>
      <li><a href="about.html">ประวัติ</a></li>
      <li><a href="education.html">การศึกษา</a></li>
      <li><a href="skills.html">ทักษะ</a></li>
      <li><a href="simulations.html">Simulations</a></li>
      <li><a href="biomass.html">Biomass</a></li>
      <li><a href="contact.html">ติดต่อ</a></li>
    </ul>
  </nav>

  <header class="hero">
    <div class="hero-bg"></div>

    <div class="glass-container">
      <img src="profile_photo.jpg" alt="ขจรศักดิ์ สิทธิวงศ์" class="profile-img" />
      <h1>ขจรศักดิ์ สิทธิวงศ์</h1>
      <h2>นักศึกษาคณะครุศาสตร์ สาขาวิชาเอกฟิสิกส์ ชั้นปีที่ 4 มหาวิทยาลัยราชภัฏอุตรดิตถ์</h2>

      <a href="about.html" class="cta-btn">探索ผลงานของฉัน</a>
    </div>
  </header>

  <footer>
    &copy; 2026 Kajornsak Sittiwong. All rights reserved.
  </footer>

</body>

</html>
