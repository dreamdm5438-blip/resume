<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ขจรศักดิ์ สิทธิวงศ์ | Portfolio</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Kanit:wght@400;600&display=swap"
    rel="stylesheet" />
  <style>
    /* ธีมจักรวาลภาษาไทยที่คุณชอบ (ดึงรูปพื้นหลังกลับมา) */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      margin: 0;
      /* ส่วนที่เรียกใช้รูปภาพพื้นหลัง (ต้องมีไฟล์ชื่อ background_photo.jpg อยู่ในโฟลเดอร์เดียวกัน) */
      background: #03020a url('background_photo.jpg') no-repeat center center fixed;
      background-size: cover;
      /* บังคับให้รูปเต็มหน้าจอพอดี */
      color: white;
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow-x: hidden;
    }

    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 20px 40px;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(10px);
      z-index: 1000;
      display: flex;
      justify-content: center;
      border-bottom: 1px solid rgba(255, 215, 0, 0.1);
    }

    .nav-brand {
      position: absolute;
      left: 40px;
      color: #ffd700;
      font-family: 'Kanit', sans-serif;
      font-weight: 600;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
    }

    .nav-menu {
      list-style: none;
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .nav-menu a {
      color: rgba(255, 255, 255, 0.8);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.9rem;
      padding: 8px 15px;
      border-radius: 5px;
      transition: 0.3s;
    }

    .nav-menu a:hover {
      color: white;
      background: rgba(255, 255, 255, 0.05);
    }

    .nav-menu a.active {
      color: white;
      background: rgba(255, 215, 0, 0.1);
      border: 1px solid rgba(255, 215, 0, 0.3);
      font-weight: 600;
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-top: 80px;
      position: relative;
      z-index: 10;
    }

    .profile-img-wrap {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      padding: 5px;
      background: linear-gradient(135deg, #ffd700, #ffaa00);
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
    }

    .profile-img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #03020a;
    }

    h1 {
      font-family: 'Kanit', sans-serif;
      font-size: 3rem;
      color: white;
      margin: 15px 0 5px;
      text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
    }

    .subtitle {
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.9);
      max-width: 600px;
      line-height: 1.6;
    }

    .btn {
      margin-top: 25px;
      padding: 12px 40px;
      background: #ffaa00;
      color: #03020a;
      border-radius: 50px;
      cursor: pointer;
      transition: 0.3s;
      text-decoration: none;
      font-family: 'Kanit', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      border: none;
      box-shadow: 0 5px 15px rgba(255, 170, 0, 0.4);
      display: inline-block;
    }

    .btn:hover {
      background: #ffd700;
      box-shadow: 0 8px 25px rgba(255, 215, 0, 0.5);
      transform: translateY(-2px);
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <div class="nav-brand">✦ KS</div>
    <ul class="nav-menu">
      <li><a href="index.html">หน้าแรก</a></li>
      <li><a href="about.html">ประวัติ</a></li>
      <li><a href="education.html">การศึกษา</a></li>
      <li><a href="skills.html">ทักษะ</a></li>
      <li><a href="simulations.html">Simulations</a></li>
      <li><a href="#">Biomass</a></li>
      <li><a href="#">ติดต่อ</a></li>
    </ul>
  </nav>

  <main class="hero">
    <div class="profile-img-wrap">
      <img src="profile_photo.jpg" alt="ขจรศักดิ์ สิทธิวงศ์" class="profile-img" />
    </div>

    <h1>ขจรศักดิ์ สิทธิวงศ์</h1>
    <p class="subtitle">นักศึกษาคณะครุศาสตร์ สาขาวิชาเอกฟิสิกส์ ชั้นปีที่ 4 มหาวิทยาลัยราชภัฏอุตรดิตถ์</p>

    <a href="about.html" class="btn">สำรวจผลงาน</a>
  </main>

</body>

</html>
