<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ขจรศักดิ์ สิทธิวงศ์ | Portfolio</title>
  <meta name="description" content="Portfolio ของ ขจรศักดิ์ สิทธิวงศ์ นักศึกษาคณะครุศาสตร์ สาขาวิชาเอกฟิสิกส์ มหาวิทยาลัยราชภัฏอุตรดิตถ์" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ===== CSS RESET & BASE ===== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gold: #FFD700;
      --gold-light: #FFE87C;
      --gold-dark: #B8860B;
      --gold-glow: rgba(255, 215, 0, 0.6);
      --orange: #FF8C00;
      --orange-light: #FFA533;
      --glass-bg: rgba(10, 5, 30, 0.45);
      --glass-border: rgba(255, 215, 0, 0.25);
      --nav-glass: rgba(5, 3, 20, 0.55);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Sarabun', 'Kanit', sans-serif;
      background: #000;
      color: #fff;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ===== STARFIELD CANVAS ===== */
    #starfield {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* ===== GALAXY BACKGROUND ===== */
    .galaxy-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      background:
        radial-gradient(ellipse 120% 80% at 50% 55%,
          rgba(60, 20, 120, 0.65) 0%,
          rgba(20, 5, 60, 0.70) 30%,
          rgba(5, 0, 25, 0.85) 65%,
          #000 100%),
        radial-gradient(ellipse 60% 40% at 30% 60%,
          rgba(100, 40, 180, 0.35) 0%,
          transparent 70%),
        radial-gradient(ellipse 40% 30% at 70% 40%,
          rgba(180, 100, 40, 0.20) 0%,
          transparent 65%),
        radial-gradient(ellipse 80% 60% at 50% 50%,
          rgba(30, 10, 80, 0.80) 0%,
          #000 100%);
      animation: galaxyPulse 12s ease-in-out infinite alternate;
    }

    @keyframes galaxyPulse {
      0%   { filter: brightness(1) hue-rotate(0deg); }
      50%  { filter: brightness(1.12) hue-rotate(8deg); }
      100% { filter: brightness(0.95) hue-rotate(-5deg); }
    }

    /* ===== NAVIGATION BAR (Glassmorphism) ===== */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      padding: 14px 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--nav-glass);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--glass-border);
      box-shadow:
        0 2px 30px rgba(0,0,0,0.6),
        0 1px 0 rgba(255,215,0,0.08) inset;
    }

    .nav-brand {
      position: absolute;
      left: 40px;
      font-family: 'Kanit', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 1px;
      text-shadow: 0 0 12px var(--gold-glow);
      white-space: nowrap;
    }

    .nav-menu {
      display: flex;
      gap: 6px;
      list-style: none;
      align-items: center;
    }

    .nav-menu li a {
      display: inline-block;
      padding: 9px 20px;
      font-family: 'Kanit', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      color: rgba(255,255,255,0.88);
      text-decoration: none;
      border-radius: 8px;
      border: 1px solid transparent;
      letter-spacing: 0.5px;
      position: relative;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      background: rgba(255,255,255,0.03);
      white-space: nowrap;
    }

    .nav-menu li a::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 8px;
      background: radial-gradient(ellipse at center, rgba(255,215,0,0.18) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .nav-menu li a:hover {
      color: var(--gold-light);
      border-color: rgba(255,215,0,0.5);
      background: rgba(255,215,0,0.08);
      text-shadow:
        0 0 8px var(--gold),
        0 0 20px rgba(255,215,0,0.5),
        0 0 40px rgba(255,165,0,0.3);
      box-shadow:
        0 0 15px rgba(255,215,0,0.25),
        0 0 30px rgba(255,165,0,0.12),
        inset 0 0 15px rgba(255,215,0,0.06);
      transform: translateY(-1px);
    }

    .nav-menu li a:hover::before {
      opacity: 1;
    }

    .nav-menu li a.active {
      color: var(--gold);
      border-color: rgba(255,215,0,0.4);
      background: rgba(255,215,0,0.07);
      text-shadow: 0 0 10px var(--gold-glow);
    }

    /* ===== HERO SECTION ===== */
    .hero {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 100px 20px 60px;
      text-align: center;
    }

    /* Nebula Glow behind photo */
    .nebula-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -52%);
      width: 600px;
      height: 500px;
      background: radial-gradient(ellipse at center,
        rgba(255,165,0,0.18) 0%,
        rgba(120,40,200,0.20) 35%,
        transparent 70%);
      filter: blur(40px);
      pointer-events: none;
      animation: nebulaPulse 6s ease-in-out infinite alternate;
    }

    @keyframes nebulaPulse {
      0%   { transform: translate(-50%, -52%) scale(1);    opacity: 0.9; }
      100% { transform: translate(-50%, -52%) scale(1.12); opacity: 1.0; }
    }

    /* ===== PROFILE PHOTO ===== */
    .profile-wrapper {
      position: relative;
      margin-bottom: 36px;
      display: inline-block;
    }

    /* Outer spinning ring */
    .ring-spin {
      position: absolute;
      inset: -16px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: var(--gold);
      border-right-color: rgba(255,215,0,0.4);
      border-bottom-color: transparent;
      border-left-color: rgba(255,215,0,0.2);
      animation: rotateSpin 8s linear infinite;
    }

    .ring-spin-reverse {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 1.5px solid transparent;
      border-top-color: rgba(255,165,0,0.5);
      border-left-color: var(--orange);
      animation: rotateSpin 5s linear infinite reverse;
    }

    @keyframes rotateSpin {
      to { transform: rotate(360deg); }
    }

    /* Golden glow ring */
    .ring-glow {
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 3px solid var(--gold);
      box-shadow:
        0 0 20px var(--gold),
        0 0 40px rgba(255,165,0,0.6),
        0 0 80px rgba(255,165,0,0.3),
        inset 0 0 20px rgba(255,215,0,0.2);
      animation: glowPulse 3s ease-in-out infinite alternate;
    }

    @keyframes glowPulse {
      0%   { box-shadow: 0 0 20px var(--gold), 0 0 40px rgba(255,165,0,0.5), 0 0 80px rgba(255,165,0,0.2); }
      100% { box-shadow: 0 0 30px var(--gold), 0 0 60px rgba(255,165,0,0.7), 0 0 120px rgba(255,165,0,0.35); }
    }

    .profile-photo {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      display: block;
      position: relative;
      z-index: 2;
      filter: brightness(1.05) contrast(1.05) saturate(1.1);
    }

    /* floating animation */
    .float-anim {
      animation: floatUp 4s ease-in-out infinite;
    }

    @keyframes floatUp {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-14px); }
    }

    /* ===== HERO TEXT ===== */
    .hero-name {
      font-family: 'Kanit', sans-serif;
      font-size: clamp(2.4rem, 5vw, 3.6rem);
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 2px;
      text-shadow:
        0 0 10px var(--gold),
        0 0 25px rgba(255,215,0,0.7),
        0 0 50px rgba(255,165,0,0.5),
        0 0 100px rgba(255,165,0,0.25);
      margin-bottom: 16px;
      animation: textGlow 3s ease-in-out infinite alternate;
    }

    @keyframes textGlow {
      0%   { text-shadow: 0 0 10px var(--gold), 0 0 25px rgba(255,215,0,0.7), 0 0 50px rgba(255,165,0,0.4); }
      100% { text-shadow: 0 0 15px var(--gold-light), 0 0 35px rgba(255,235,0,0.9), 0 0 70px rgba(255,200,0,0.6), 0 0 120px rgba(255,165,0,0.35); }
    }

    .hero-desc {
      font-family: 'Sarabun', sans-serif;
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      font-weight: 400;
      color: var(--gold-light);
      text-shadow:
        0 0 8px rgba(255,215,0,0.8),
        0 0 20px rgba(255,215,0,0.4);
      line-height: 1.7;
      max-width: 560px;
      margin: 0 auto 40px;
      letter-spacing: 0.5px;
    }

    .hero-desc span {
      display: block;
    }

    /* ===== CTA BUTTON ===== */
    .btn-explore {
      display: inline-block;
      padding: 16px 52px;
      font-family: 'Kanit', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
      text-decoration: none;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      letter-spacing: 1.5px;
      background: linear-gradient(135deg, #FF8C00 0%, #FF6B00 40%, #E05A00 100%);
      box-shadow:
        0 4px 20px rgba(255,140,0,0.5),
        0 2px 8px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(255,255,255,0.15);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .btn-explore::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -60%;
      width: 60%;
      height: 200%;
      background: linear-gradient(105deg, transparent, rgba(255,255,255,0.25), transparent);
      transform: skewX(-20deg);
      transition: left 0.5s ease;
    }

    .btn-explore:hover {
      background: linear-gradient(135deg, #FFA500 0%, #FF7800 40%, #FF5500 100%);
      box-shadow:
        0 6px 30px rgba(255,140,0,0.7),
        0 3px 12px rgba(0,0,0,0.5),
        0 0 60px rgba(255,120,0,0.3);
      transform: translateY(-3px) scale(1.04);
    }

    .btn-explore:hover::before {
      left: 120%;
    }

    .btn-explore:active {
      transform: translateY(-1px) scale(1.01);
    }

    /* ===== SCROLL INDICATOR ===== */
    .scroll-indicator {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      opacity: 0.55;
      animation: scrollBounce 2s ease-in-out infinite;
    }

    .scroll-indicator span {
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
    }

    .scroll-arrow {
      width: 20px;
      height: 20px;
      border-right: 2px solid var(--gold);
      border-bottom: 2px solid var(--gold);
      transform: rotate(45deg);
    }

    @keyframes scrollBounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(8px); }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 900px) {
      .nav-brand { display: none; }
      .navbar { padding: 12px 10px; }
      .nav-menu li a { padding: 8px 12px; font-size: 0.82rem; }
    }

    @media (max-width: 600px) {
      .nav-menu { gap: 2px; flex-wrap: wrap; justify-content: center; }
      .nav-menu li a { padding: 7px 10px; font-size: 0.78rem; }
      .profile-photo { width: 170px; height: 170px; }
    }
  </style>
</head>
<body>

  <!-- Galaxy Background -->
  <div class="galaxy-bg"></div>

  <!-- Starfield Canvas -->
  <canvas id="starfield"></canvas>

  <!-- ===== NAVIGATION BAR ===== -->
  <nav class="navbar" id="navbar">
    <span class="nav-brand">✦ KS</span>
    <ul class="nav-menu">
      <li><a href="#home" class="active" id="nav-home">Home</a></li>
      <li><a href="#about" id="nav-about">About</a></li>
      <li><a href="#education" id="nav-education">Education</a></li>
      <li><a href="#skills" id="nav-skills">Skills</a></li>
      <li><a href="#simulations" id="nav-simulations">Simulations</a></li>
      <li><a href="#biomass" id="nav-biomass">Biomass</a></li>
      <li><a href="#contact" id="nav-contact">Contact</a></li>
    </ul>
  </nav>

  <!-- ===== HERO SECTION ===== -->
  <section class="hero" id="home">
    <!-- Nebula glow -->
    <div class="nebula-glow"></div>

    <!-- Profile Photo -->
    <div class="profile-wrapper float-anim">
      <div class="ring-spin"></div>
      <div class="ring-spin-reverse"></div>
      <div class="ring-glow"></div>
      <img
        src="profile_photo.jpg"
        alt="ขจรศักดิ์ สิทธิวงศ์"
        class="profile-photo"
        onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjIwIiBoZWlnaHQ9IjIyMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48Y2lyY2xlIGN4PSIxMTAiIGN5PSIxMTAiIHI9IjExMCIgZmlsbD0iIzFhMDYzZSIvPjwvc3ZnPg=='"
      />
    </div>

    <!-- Name -->
    <h1 class="hero-name">ขจรศักดิ์ สิทธิวงศ์</h1>

    <!-- Description -->
    <p class="hero-desc">
      <span>นักศึกษาคณะครุศาสตร์ สาขาวิชาเอกฟิสิกส์</span>
      <span>ชั้นปีที่ 4 มหาวิทยาลัยราชภัฏอุตรดิตถ์</span>
    </p>

    <!-- CTA Button -->
    <a href="#about" class="btn-explore">สำรวจผลงาน</a>

    <!-- Scroll Indicator -->
    <div class="scroll-indicator">
      <span>Scroll</span>
      <div class="scroll-arrow"></div>
    </div>
  </section>

  <!-- ===== STARFIELD SCRIPT ===== -->
  <script>
    // Starfield
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let stars = [];
    let animFrame;

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function initStars(count = 280) {
      stars = [];
      for (let i = 0; i < count; i++) {
        const r = Math.random();
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: r < 0.6 ? 0.5 + Math.random() * 0.8
           : r < 0.9 ? 1.0 + Math.random() * 1.2
           :            1.8 + Math.random() * 1.5,
          alpha: 0.3 + Math.random() * 0.7,
          speed: 0.002 + Math.random() * 0.006,
          gold: Math.random() < 0.12,
          phase: Math.random() * Math.PI * 2,
        });
      }
    }

    function drawStars(t) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      stars.forEach(s => {
        const tw = s.alpha * (0.6 + 0.4 * Math.sin(t * s.speed * 60 + s.phase));
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        if (s.gold) {
          ctx.fillStyle = `rgba(255,215,0,${tw})`;
          if (s.r > 1.5) {
            ctx.shadowColor = 'rgba(255,215,0,0.8)';
            ctx.shadowBlur  = 8;
          }
        } else {
          ctx.fillStyle = `rgba(255,255,255,${tw})`;
          ctx.shadowBlur = 0;
        }
        ctx.fill();
        ctx.shadowBlur = 0;
      });
    }

    let last = 0;
    function loop(t) {
      drawStars(t);
      animFrame = requestAnimationFrame(loop);
    }

    window.addEventListener('resize', () => { resize(); initStars(); });
    resize();
    initStars();
    requestAnimationFrame(loop);

    // Nav active link highlighting on click
    document.querySelectorAll('.nav-menu a').forEach(link => {
      link.addEventListener('click', function() {
        document.querySelectorAll('.nav-menu a').forEach(l => l.classList.remove('active'));
        this.classList.add('active');
      });
    });
  </script>
</body>
</html>
