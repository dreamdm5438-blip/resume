<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>หน้าแรก | ขจรศักดิ์ สิทธิวงศ์</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&family=Kanit:wght@400;600;700&display=swap"
    rel="stylesheet" />
  <style>
    /* ===== RESET & BASE ===== */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #03020a;
      color: white;
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== NAVBAR (แถบเมนูจักรวาล) ===== */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 15px 40px;
      background: rgba(0, 0, 0, 0.8);
      /* พื้นหลังดำโปร่งแสง */
      backdrop-filter: blur(10px);
      z-index: 1000;
      display: flex;
      justify-content: center;
      border-bottom: 1px solid rgba(255, 215, 0, 0.2);
    }

    .nav-brand {
      font-family: 'Kanit', sans-serif;
      font-size: 1.5rem;
      color: #ffd700;
      font-weight: 700;
      display: none;
      /* ซ่อนชื่อแบรนด์ถ้าหน้าจอเล็ก */
    }

    .nav-menu {
      list-style: none;
      display: flex;
      gap: 15px;
      margin: 0;
      padding: 0;
    }

    .nav-menu a {
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      font-family: 'Kanit', sans-serif;
      font-size: 0.95rem;
      padding: 8px 15px;
      border-radius: 5px;
      transition: 0.3s;
    }

    .nav-menu a:hover,
    .nav-menu a.active {
      color: #ffd700;
      /* สีทอง */
      background: rgba(255, 215, 0, 0.1);
    }

    /* ===== HERO SECTION (ส่วนหัวหน้าแรกใหม่) ===== */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background-image: radial-gradient(circle at center, rgba(30, 10, 60, 0.5) 0%, rgba(3, 2, 10, 1) 70%);
      /* กราเดียนท์วงกลม */
      padding: 0 20px;
    }

    /* ใส่รูปพื้นหลังที่นี่ */
    .hero-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      /* แก้ชื่อไฟล์รูปพื้นหลังตรงนี้ */
      background-image: url('bg-space-new.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: -1;
      opacity: 0.5;
      /* ความโปร่งแสงของรูป */
    }

    .hero h1 {
      font-family: 'Kanit', sans-serif;
      font-size: 4rem;
      color: #ffd700;
      text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
      margin-bottom: 15px;
    }

    .hero h2 {
      font-size: 1.5rem;
      color: rgba(255, 255, 255, 0.8);
      font-weight: 300;
      margin-bottom: 40px;
    }

    .cta-btn {
      display: inline-block;
      padding: 15px 40px;
      background: linear-gradient(45deg, #ffd700, #ff8c00);
      color: #03020a;
      text-decoration: none;
      font-family: 'Kanit', sans-serif;
      font-weight: 700;
      border-radius: 50px;
      transition: 0.3s;
      box-shadow: 0 5px 20px rgba(255, 215, 0, 0.3);
    }

    .cta-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(255, 215, 0, 0.5);
    }

    /* สไตล์สำหรับรูปภาพโปรไฟล์ (ถ้ามี) */
    .profile-img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 5px solid #ffd700;
      object-fit: cover;
      margin-bottom: 30px;
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
    }

    /* ===== FOOTER ===== */
    footer {
      padding: 30px;
      text-align: center;
      color: rgba(255, 255, 255, 0.3);
      font-size: 0.8rem;
      border-top: 1px solid rgba(255, 215, 0, 0.1);
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <div class="nav-brand">✦ KS</div>
    <ul class="nav-menu">
      <li><a href="index.html" class="active">หน้าแรก</a></li>
      <li><a href="about.html">ประวัติ</a></li>
      <li><a href="education.html">การศึกษา</a></li>
      <li><a href="skills.html">ทักษะ</a></li>
      <li><a href="simulations.html">Simulations</a></li>
      <li><a href="biomass.html">Biomass</a></li>
      <li><a href="contact.html">ติดต่อ</a></li>
    </ul>
  </nav>

  <header class="hero">
    <div class="hero-bg"></div>
    <h1>ขจรศักดิ์ สิทธิวงศ์</h1>
    <h2>ผู้นำด้านนวัตกรรมการสอนฟิสิกส์และพลังงานทางเลือก</h2>

    <a href="about.html" class="cta-btn">ทำความรู้จัก</a>
  </header>

  <footer>
    &copy; 2026 Kajornsak Sittiwong. All rights reserved.
  </footer>

</body>

</html>
