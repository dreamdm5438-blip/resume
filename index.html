<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ขจรศักดิ์ สิทธิวงศ์ | Portfolio</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Kanit:wght@400;600&display=swap"
    rel="stylesheet" />
  <style>
    /* ธีมจักรวาลสีม่วงทองที่คุณชอบ */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      margin: 0;
      background: #03020a;
      color: white;
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 20px;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      z-index: 1000;
      display: flex;
      justify-content: center;
      border-bottom: 1px solid rgba(255, 215, 0, 0.1);
    }

    .nav-menu {
      list-style: none;
      display: flex;
      gap: 20px;
    }

    .nav-menu a {
      color: rgba(255, 255, 255, 0.8);
      text-decoration: none;
      font-size: 0.9rem;
      padding: 8px 15px;
      transition: 0.3s;
    }

    .nav-brand {
      position: absolute;
      left: 40px;
      color: #ffd700;
      font-weight: bold;
    }

    .profile-img-wrap {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      padding: 5px;
      background: linear-gradient(135deg, #ffd700, #ffaa00);
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
      margin-bottom: 20px;
    }

    .profile-img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #03020a;
    }

    h1 {
      font-family: 'Kanit', sans-serif;
      font-size: 3rem;
      color: white;
      text-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
    }

    .subtitle {
      font-size: 1.1rem;
      opacity: 0.9;
      margin: 10px 0 25px;
    }

    .btn {
      padding: 12px 40px;
      background: #ffaa00;
      color: #03020a;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      transition: 0.3s;
      box-shadow: 0 5px 15px rgba(255, 170, 0, 0.4);
    }

    .btn:hover {
      background: #ffd700;
      transform: translateY(-2px);
    }
  </style>
</head>

<body>
  <nav class="navbar">
    <div class="nav-brand">✦ KS</div>
    <ul class="nav-menu">
      <li><a href="index.html" style="border-bottom: 2px solid #ffd700;">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="education.html">Education</a></li>
      <li><a href="#">Skills</a></li>
      <li><a href="#">Simulations</a></li>
      <li><a href="#">Biomass</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>
  <div class="profile-img-wrap">
    <img src="profile_photo.jpg" alt="ขจรศักดิ์" class="profile-img" />
  </div>
  <h1>ขจรศักดิ์ สิทธิวงศ์</h1>
  <p class="subtitle">นักศึกษาคณะครุศาสตร์ สาขาวิชาเอกฟิสิกส์ ชั้นปีที่ 4 มรภ.อุตรดิตถ์</p>
  <a href="about.html" class="btn">สำรวจผลงาน</a>
</body>

</html>
